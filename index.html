<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 Condo Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1e40af;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: #9ca3af;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      border: 2px solid transparent;
      transition: all .2s;
      cursor: pointer;
    }
    .card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 20px rgba(59,130,246,.15);
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 40px;
      flex-shrink: 0;
    }
    .card-body h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 4px;
    }
    .card-body p {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: #eff6ff;
      color: #3b82f6;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .badge.green {
      background: #f0fdf4;
      color: #16a34a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏠 Condo Manager</h1>
      <p>เลือกโปรแกรมที่ต้องการใช้งาน</p>
    </div>

    <a class="card" href="property-manager.html">
      <div class="card-icon">🏢</div>
      <div class="card-body">
        <h2>Property Manager</h2>
        <p>จัดการอสังหาริมทรัพย์หลายโครงการ เพิ่ม/ลบได้ไม่จำกัด</p>
      </div>
    </a>

    <a class="card" href="the-base-manage-final.html">
      <div class="card-icon">🏖️</div>
      <div class="card-body">
        <h2>The Base เชิงทะเล</h2>
        <p>จัดการห้องเช่า The Base ภูเก็ต · by Sansiri</p>
        <span class="badge">4 ห้อง</span>
      </div>
    </a>
  </div>
</body>
</html>
